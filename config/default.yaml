# config/default.yaml
app:
  name: "Vision Gate"
  version: "1.0.0"
  environment: "development"  # development/production

logging:
  level: "INFO"
  file_enabled: true
  file_path: "logs/vision_gate.log"
  console_enabled: true
  console_color: true

photoelectric:
  host: 192.168.1.117
  port: 500
  timeout: 3.0

database:
  a: "data/vision_gate.db"
  b: false  # 是否打印SQL语句

