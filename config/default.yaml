# config/default.yaml
app:
  name: "Vision Gate"
  version: "1.0.0"
  environment: "development"

logging:
  level: "DEBUG"
  file_enabled: true
  file_path: "logs/vision_gate.log"
  console_enabled: true
  console_color: true

photoelectric:
  host: 192.168.1.117
  port: 500
  timeout: 3.0

#scheduler:
#  scan_window: 5.0      # 扫码窗口时间（秒）
#  max_retries: 3         # 最大重试次数
#  retry_interval: 0.2    # 重试间隔（秒）

track:
  timeout: 30.0          # 轨迹超时时间（秒）

decision:
  require_all_cameras: true  # 是否需要所有相机都成功
  ok_condition: "any_success"  # any_success / all_success

trigger:
  ttl_ms: 500
pe1_to_pe2_dist: 0.39
pe2_to_camera_dist: 0.36