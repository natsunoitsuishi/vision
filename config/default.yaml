# config/default.yaml
app:
  name: "Vision Gate"
  version: "1.0.0"
  environment: "development"

logging:
  level: "DEBUG"
  file_enabled: true
  file_path: "logs/vision_gate.log"
  console_enabled: true
  console_color: true

repeat_check_time: 10_000
pe1_to_pe2_dist: 0.30
pe2_to_camera_dist: 0.36

camera:
  host: 192.168.1.79
  trigger_port: 1025
  read_port: 1024
  delay: 400

photoelectric:
  host: 192.168.1.117
  port: 500
  timeout: 3.0

scheduler_client:
  id: VG-01
  host: 127.0.0.1
  port: 8080

mes:
  id: "VG-01"
  line_id: "LINE-01"
  host: 127.0.0.1
  port: 9090

divert:
  tcp_host: "192.168.1.100"
  tcp_port: 8888

track:
  timeout_ms: 1500

trigger:
  ttl_ms: 300
#scheduler:
#  scan_window: 5.0      # 扫码窗口时间（秒）
#  max_retries: 3         # 最大重试次数
#  retry_interval: 0.2    # 重试间隔（秒）