# config/default.yaml
app:
  name: "Vision Gate"
  version: "1.0.0"
  environment: "development"

logging:
  level: "DEBUG"
  file_enabled: true
  file_path: "logs/vision_gate.log"
  console_enabled: true
  console_color: true

window_tolerance_ms: 50   # 窗口边界容差（毫秒）
repeat_check_time: 7_000
pe1_to_pe2_dist: 0.30
pe2_to_camera_dist: 0.36

camera:
  host: 192.168.1.79
  trigger_port: 1025
  read_port: 1024
  timeout: 3.0
  delay: 3500

photoelectric:
  host: 192.168.1.117
  port: 501
  timeout: 3.0

scheduler_client:
  id: VG-01
  host: 127.0.0.1
  port: 8080

mes:
  id: "VG-01"
  line_id: "LINE-01"
  host: 127.0.0.1
  port: 9090

# 摆轮机PLC配置
divert:
  tcp_host: "192.168.1.200"           # PLC IP地址
  tcp_port: 502                       # PLC端口
  # 地址映射
  registers:
    d0_direction: 0x0000          # D0 寄存器地址（方向控制）
    d1_direction: 0x0001          # D1 寄存器地址（方向控制）

  # 方向值映射（根据PLC协议）
  direction_values:
    1: 1    # 方向1
    2: 2    # 方向2
    3: 3    # 方向3
    4: 4    # 方向4

track:
  timeout_ms: 10000

trigger:
  ttl_ms: 300
